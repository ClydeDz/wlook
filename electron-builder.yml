appId: com.wlook.app
productName: Wlook
copyright: Copyright © 2026 Wlook
directories:
  output: release
files:
  - dist/**/*
  - assets/**/*
  - package.json
  - node_modules/**/*
  - "!node_modules/.cache"
  - "!node_modules/.yarn-integrity"
  - "!src/**/*"
  - "!tools/**/*"
  - "!tests/**/*"
  - "!scripts/**/*"
extraResources:
  - from: assets/
    to: assets/
    filter: ["**/*"]
asarUnpack:
  - "**/*.node"
win:
  icon: assets/icons/app.ico
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: false
  createStartMenuShortcut: true
  installerIcon: assets/icons/app.ico
  uninstallerIcon: assets/icons/app.ico
  runAfterFinish: true
mac:
  icon: assets/icons/app.icns
  category: public.app-category.utilities
linux:
  target: AppImage
  icon: assets/icons/app.png
# `publish: ~` (YAML null) disables electron-builder's publish pipeline
# entirely. This is the canonical disable knob in electron-builder 24.x
# — `PublishManager.getPublishConfigs()` short-circuits with `return null`
# when `config.publish === null`, so no GitHubPublisher is ever
# constructed and no `app-update.yml` is written into the artifact.
# Publishing happens out-of-band via the `softprops/action-gh-release@v2`
# step in `.github/workflows/release.yml`, which attaches the three
# release files to a GitHub Release using `secrets.GITHUB_TOKEN`.
#
# Do NOT use these alternatives — they look like they should work but
# each fails in this version:
# - `publish: 'never'` — treated as a publisher-name and fails with
#   `Cannot find module 'electron-publisher-never'`.
# - `ELECTRON_BUILDER_PUBLISH=never` env var — `PublishManager.js` in
#   24.13.3 does not read the env var at all.
publish: ~
