appId: com.wlook.app
productName: Wlook
copyright: Copyright © 2026 Wlook
directories:
  output: release
files:
  - dist/**/*
  - assets/**/*
  - package.json
  - node_modules/**/*
  - "!node_modules/.cache"
  - "!node_modules/.yarn-integrity"
  - "!src/**/*"
  - "!tools/**/*"
  - "!tests/**/*"
  - "!scripts/**/*"
extraResources:
  - from: assets/
    to: assets/
    filter: ["**/*"]
asarUnpack:
  - "**/*.node"
win:
  icon: assets/icons/app.ico
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: false
  createStartMenuShortcut: true
  installerIcon: assets/icons/app.ico
  uninstallerIcon: assets/icons/app.ico
  runAfterFinish: true
mac:
  icon: assets/icons/app.icns
  category: public.app-category.utilities
linux:
  target: AppImage
  icon: assets/icons/app.png
# No `publish:` block here. Publishing is done out-of-band by
# `.github/workflows/release.yml` (the `softprops/action-gh-release@v2`
# step), which attaches `Wlook Setup <version>.exe`,
# `Wlook Setup <version>.exe.blockmap`, and `latest.yml` from the
# `release/` directory to a GitHub Release using `secrets.GITHUB_TOKEN`.
#
# To keep `yarn package` deterministic (no auto-publish from this
# config), the actual disable signal is set via the
# `ELECTRON_BUILDER_PUBLISH=never` environment variable — applied at
# the package script in `package.json` for local runs and at the
# `yarn package` step in `release.yml` for CI. Do NOT set
# `publish: 'never'` here: in electron-builder 24.x that value is
# interpreted as a custom publisher named "never" and the build fails
# with `Cannot find module 'electron-publisher-never'`. The env var
# short-circuits publishing at a higher layer and works in all
# versions.
