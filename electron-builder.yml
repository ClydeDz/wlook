appId: com.wlook.app
productName: Wlook
copyright: Copyright © 2026 Wlook
directories:
  output: release
files:
  - dist/**/*
  - assets/**/*
  - package.json
  - node_modules/**/*
  - "!node_modules/.cache"
  - "!node_modules/.yarn-integrity"
  - "!src/**/*"
  - "!tools/**/*"
  - "!tests/**/*"
  - "!scripts/**/*"
extraResources:
  - from: assets/
    to: assets/
    filter: ["**/*"]
asarUnpack:
  - "**/*.node"
win:
  icon: assets/icons/app.ico
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: false
  createStartMenuShortcut: true
  installerIcon: assets/icons/app.ico
  uninstallerIcon: assets/icons/app.ico
  runAfterFinish: true
mac:
  icon: assets/icons/app.icns
  category: public.app-category.utilities
linux:
  target: AppImage
  icon: assets/icons/app.png
# Publishing is handled out-of-band by
# `.github/workflows/release.yml` (the `softprops/action-gh-release@v2`
# step) which attaches `Wlook Setup <version>.exe`,
# `Wlook Setup <version>.exe.blockmap`, and `latest.yml` from the
# `release/` directory to a GitHub Release.
# Keeping the old `provider: github` block here would make
# `PublishManager` try to upload the same artifacts again during
# `yarn package`, fail with "GitHub Personal Access Token is not set",
# and exit code 1 — even though no `GH_TOKEN` is needed because the
# workflow's separate release step does the publish against
# `secrets.GITHUB_TOKEN`. `never` keeps `yarn package` deterministic
# locally and in CI.
publish: never
